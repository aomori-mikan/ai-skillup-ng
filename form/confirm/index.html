<!DOCTYPE html>
  <html>

  <head>
    
<meta charset="UTF-8" />
<!-- 検索で引っかからないようにする -->
<meta name="robots"
      content="noindex,nofollow" />
<meta name="viewport"
      content="width=device-width, initial-scale=1.0" />

<!-- pagedata.jsonで出力されたタイトルを表示  -->
<meta name="description"
      content="申し込みフォーム">
<meta property="og:image"
      content="./assets/images/image-ogp.png">
<title>申し込みフォーム|AI Skill Up</title>

<link rel="icon" href="../../assets/images/favicon.svg" type="image/svg+xml">

<!-- フォント -->
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link
  href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;700&display=swap"
  rel="stylesheet">
    <script type="module" crossorigin src="../../assets/js/main.js"></script>
    <link rel="stylesheet" crossorigin href="../../assets/css/style.css">
  </head>

  <body data-page="confirm">
    <header>
      <div class="c-header page">
        <a href="../index.html" class="c-header__logo">
          <img src="../../assets/images/logo-renew2.svg" alt="AI Skill Up">
        </a>
      </div>
    </header>

    <main>

      <div class="form-header">
        <h1 class="stepper-title">講座申し込みフォーム</h1>
        <ol class="stepper">
          <li class="step">
            <div class="step-number">1</div>
            <div class="step-label">入力</div>
          </li>
          <li class="step active" aria-current="step">
            <div class="step-number">2</div>
            <div class="step-label">確認</div>
          </li>
          <li class="step">
            <div class="step-number">3</div>
            <div class="step-label">完了</div>
          </li>
        </ol>
      </div>

      <form method="post" class="form-container">
        <div id="confirmContainer"></div>
      </form>
      <div class="box_bottom box_bottom2">
        <a href="../" class="btn btn-secondary">入力項目へ戻る</a>
        <button class="btn3" type="button" onclick="submitForm()">送信する</button>
      </div>

    </main>
    
  <footer class="footer">
    <div class="caution" role="note">
      <p>本サイトはポートフォリオを目的として制作した架空サイトです。実在する企業・団体・サービスとは関係ありません。<br class="sp_visible">改善版は
        <a href="https://aomori-mikan.github.io/ai-skillup/" target="_blank" rel="noopener noreferrer" class="external">
          こちら
        </a>をご確認ください。
      </p>

    </div>

  </footer>



  </body>

  </html>
