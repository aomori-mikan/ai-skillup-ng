    <header>
      <div class="c-header page">

    <main>
      <div class="form-header">
        <h1 class="stepper-title">講座申し込みフォーム</h1>
        <ol class="stepper">
          <li class="step active" aria-current="step">
            <div class="step-number">1</div>
            <div class="step-label">入力</div>
          </li>
          <li class="step">
            <div class="step-number">2</div>
            <div class="step-label">確認</div>
          </li>
          <li class="step">
            <div class="step-number">3</div>
            <div class="step-label">完了</div>
          </li>
        </ol>
        <p class="timeout-message">期間限定50%オフ！終了までのこり○○:○○:○○</p>
      </div>

      <form method="post" class="form-container">
        <div class="form-row">
          <div class="form-group name">
            <p id="name" class="label-title">
              氏名<span class="required">＊</span>
            </p>

            <div class="name-group">

              <div>
                <!--<label for="lastName" class="sr-only">姓</label>-->
                <input type="text" id="lastName" name="lastName" autocomplete="family-name" required
                  placeholder="例) 山田">
              </div>

              <div>
                <!--<label for="firstName" class="sr-only">名</label>-->
                <input type="text" id="firstName" name="firstName" autocomplete="given-name" required
                  placeholder="例) 太郎">
              </div>

            </div>
            <div class="error" id="lastNameError"></div>
            <div class="error" id="firstNameError"></div>
          </div>
        </div>



        <div class="form-group select">
          <div id="birthDate" class="label-title">生年月日<span class="required">＊</span></div>

          <div class="birth-group">

            <div class="sr-only">生年</div>
            <select id="birthYear" name="birthYear" autocomplete="bday-year" required>
              <option value="">年</option>
            </select>
            <span aria-hidden="true">年</span>

            <div class="sr-only">生月</div>
            <select id="birthMonth" name="birthMonth" autocomplete="bday-month" required>
              <option value="">月</option>
            </select>
            <span aria-hidden="true">月</span>

            <div class="sr-only">生日</div>
            <select id="birthDay" name="birthDay" autocomplete="bday-day" required>
              <option value="">日</option>
            </select>
            <span aria-hidden="true">日</span>

          </div>
        </div>

          <div class="label-title" aria-hidden="true">職業</div>

            <option value="">選択してください</option>
            <option value="会社員">会社員</option>
            <option value="公務員">公務員</option>
            <option value="会社役員">会社役員</option>
            <option value="自営業">自営業</option>
            <option value="アルバイト・パート">アルバイト・パート</option>
            <option value="主婦（主夫）">主婦（主夫）</option>
            <option value="学生">学生</option>
            <option value="その他">その他</option>
          </select>
        </div>


        <div class="form-group tel">
          <div class="label-title" aria-hidden="true">電話番号</div>
          <input type="tel" id="phone" name="phone" autocomplete="tel">
        </div>

        <div class="form-group">
          <div class="label-title" aria-hidden="true">自己紹介</div>
          <textarea id="introduction" name="introduction" placeholder="自己紹介やAIに対する想いを300文字以内で入力してください。"></textarea>
          <div class="error" id="introductionError"></div>
        </div>

        <div class="form-group">
          <div class="label-title" aria-hidden="true">趣味</div>
          <input type="text" id="hobby" name="hobby">
        </div>

        <div class="form-group">
          <div class="label-title" aria-hidden="true">メールアドレス<span class="required">＊</span></div>
          <input type="email" id="email" name="email" autocomplete="email" required="required">
          <div class="error" id="emailError"></div>
        </div>


        <div class="form-group select-course select">
          <div class="label-title" aria-hidden="true">
            希望コース<span class="required">＊</span>
          </div>
          <select id="course" name="course" required>
            <option value="">選択してください</option>
            <option value="基礎コース">基礎コース</option>
            <option value="エンジニアコース">エンジニアコース</option>
          </select>
        </div>

        <div class="form-group">
          <div class="label-title">サービスを知ったきっかけ</div>
          <div class="checkbox-group">
            <div class="checkbox-item-wrap">
              <div class="checkbox-item">
                <input type="checkbox" name="source" value="チラシ" onclick="validateAndSubmit()">
                チラシ
              </div>
            </div>
            <div class="checkbox-item-wrap">
              <div class="checkbox-item">
                <input type="checkbox" name="source" value="Webサイト" onclick="validateAndSubmit()">
                Webサイト
              </div>
            </div>
            <div class="checkbox-item-wrap">
              <div class="checkbox-item">
                <input type="checkbox" name="source" value="口コミ" onclick="validateAndSubmit()">
                口コミ
              </div>
            </div>
          </div>
        </div>

        <div class="form-group">
          <div class="label-title">その他質問</div>
          <textarea id="questions" name="questions"></textarea>
        </div>

      <div class="form-instruction">
        <p>サービスを利用するには利用規約への同意が必要です。<br><a href="https://designare.jp/service/usability">利用規約</a>をご確認ください。</p>
        <div class="checkbox-group">
          <div class="entry_user_policy_check_wrap">
            <input type="checkbox" id="entry_user_policy_check" name="entry[user_policy_check]" required="required"
              title="" value="1">
            利用規約に同意する
          </div>

        </div>
      </div>


      <div class="box_bottom">
        <button type="submit" class="btn btn-primary" onclick="validateAndSubmit()">OK</button>
      </div>
